<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- Tailwind CSS -->
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/gh/creativetimofficial/tailwind-starter-kit/compiled-tailwind.min.css" />
  <title>Sentiment Analysis</title>
</head>
<body class="text-gray-800 antialiased">
  <div class="relative pt-16 pb-32 flex content-center items-center justify-center" style="min-height: 75vh;">
    <div class="absolute top-0 w-full h-full bg-cover"
      style="background-image: linear-gradient(90deg, rgba(17,223,169,1) 0%, rgba(3,60,88,1) 49%, rgba(10,32,50,1) 100%);">
      <span class="w-full h-full absolute opacity-50 bg-black"></span>
    </div>
    <div class="container relative mx-auto text-center">
      <h1 class="text-white font-semibold text-5xl">
        Decode emotions, drive growth, <br> 
        and elevate your reputation.😊
      </h1>
      <p class="mt-4 text-lg text-gray-300">
        Sentiment Analysis of Amazon Product Reviews
      </p>
    </div>
  </div>
  <section class="py-20">
    <div class="text-center mb-10">
      <h1 class="text-4xl font-semibold">Text Sentiment Prediction</h1>
    </div>
    <div class="container mx-auto px-4 flex flex-wrap">
      <div class="w-full md:w-5/12 mx-auto">
        <form id="predictionForm" onsubmit="event.preventDefault(); predict();">
          <div class="mb-4">
            <label class="text-sm text-gray-600">Upload CSV File</label>
            <input type="file" id="csvFileInput" accept=".csv"
              class="w-full px-3 py-2 border-2 rounded-lg shadow-md">
          </div>
          <div class="mb-4">
            <label class="text-sm text-gray-600">Enter Text</label>
            <textarea id="textInput" placeholder="Enter review..."
              class="w-full px-3 py-2 border-2 rounded-lg shadow-md"></textarea>
          </div>
          <button type="submit"
            class="w-full bg-gray-800 text-white py-3 rounded-lg shadow-lg hover:bg-black">
            Predict
          </button>
        </form>
      </div>
      <div class="w-full md:w-5/12 mx-auto mt-10 md:mt-0">
        <h2 class="text-2xl font-semibold underline">Prediction Result</h2>
        <div class="p-4 border mt-2" id="predictionResult"></div>
        <h2 class="text-2xl font-semibold underline mt-6">Graph Result</h2>
        <div class="p-4 border mt-2" id="graphContainer"></div>
        <button id="downloadBtn" style="display:none"
          class="mt-6 w-full bg-gray-800 text-white py-3 rounded-lg hover:bg-black">
          Download Predictions
        </button>
      </div>
    </div>
  </section>
  <footer class="bg-gray-900 text-white text-center py-4">
    <p>© Sentiment Analysis Project</p>
  </footer>
</body>

<!-- SCRIPT -->
<script>
  function predict() {
    const csvFileInput = document.getElementById("csvFileInput");
    const textInput = document.getElementById("textInput");
    const predictionResult = document.getElementById("predictionResult");
    const graphContainer = document.getElementById("graphContainer");
    const downloadBtn = document.getElementById("downloadBtn");

    // Clear old results
    predictionResult.innerHTML = "";
    graphContainer.innerHTML = "";
    downloadBtn.style.display = "none";

    // CSV UPLOAD
    if (csvFileInput.files.length > 0) {
      const formData = new FormData();
      formData.append("file", csvFileInput.files[0]);

      fetch("/predict", {
        method: "POST",
        body: formData
      })
        .then(res => {
          if (res.headers.get("X-Graph-Exists") === "true") {
            displayGraph(res.headers.get("X-Graph-Data"));
          }
          return res.blob();
        })
        .then(blob => {
          predictionResult.innerHTML = "Bulk prediction completed ✅";

          downloadBtn.style.display = "block";
          downloadBtn.onclick = () => {
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "Predictions.csv";
            a.click();
          };
        })
        .catch(err => {
          predictionResult.innerHTML = "Error: " + err;
        });
    }

    // TEXT INPUT
    else if (textInput.value.trim() !== "") {
      fetch("/predict", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ text: textInput.value })
      })
        .then(res => res.json())
        .then(data => {
          if (data.error) {
            predictionResult.innerHTML = "Error: " + data.error;
          } else {
            predictionResult.innerHTML =
              "<strong>Predicted Sentiment:</strong> " + data.prediction;
          }
        })
        .catch(err => {
          predictionResult.innerHTML = "Error: " + err;
        });
    }

    else {
      predictionResult.innerHTML = "Please enter text or upload CSV.";
    }
  }

  function displayGraph(graphData) {
    const graphContainer = document.getElementById("graphContainer");

    const img = document.createElement("img");
    img.src = "data:image/png;base64," + graphData;
    img.style.width = "100%";

    graphContainer.appendChild(img);
  }
</script>
</html>
